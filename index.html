<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipzi - Pulsa Prabayar</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        input { background: #2a2a2a; color: #fff; }
        button { background: #007bff; color: #fff; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        .badge { background: #e7f1ff; color: #007bff; padding: 5px 10px; border-radius: 5px; display: inline-block; margin: 10px 0; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="color: #007bff;">Pipzi</h1>
        
        <div id="step-input">
            <label>Nomor Tujuan</label>
            <input type="text" id="phone" placeholder="Contoh: 08515xxx" autocomplete="off">
            <div id="operator-box" class="hidden">
                <span class="badge" id="operator-name"></span>
            </div>
            <button id="btn-lanjut" disabled>Lanjutkan</button>
        </div>

        <div id="step-pay" class="hidden">
            <h3>Pembayaran QRIS</h3>
            <p>Pindai kode QR untuk pembayaran</p>
            <h2 style="color: #ffc107;">Rp 11.500</h2>
            <p>Detail Transaksi: <br><span id="detail-phone" style="color: #007bff;"></span></p>
            <img src="/qris.png" alt="QRIS Pembayaran" style="width: 200px; height: 200px; background: #fff; margin: 10px auto; display: block;">
            <input type="text" id="resi" placeholder="Masukkan ID Referensi / Resi DANA">
            <button id="btn-konfirmasi">Konfirmasi Pembayaran</button>
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('phone');
        const operatorBox = document.getElementById('operator-box');
        const operatorName = document.getElementById('operator-name');
        const btnLanjut = document.getElementById('btn-lanjut');
        const btnKonfirmasi = document.getElementById('btn-konfirmasi');
        
        const stepInput = document.getElementById('step-input');
        const stepPay = document.getElementById('step-pay');
        const detailPhone = document.getElementById('detail-phone');
        const resiInput = document.getElementById('resi');

        const operators = {
            "by.U": /^(08515)/,
            "Telkomsel": /^(0811|0812|0813|0821|0822|0823|0851|0852|0853)/,
            "IM3 (Indosat)": /^(0814|0815|0816|0855|0856|0857|0858)/,
            "Tri (3)": /^(0895|0896|0897|0898|0899)/,
            "XL": /^(0817|0818|0819|0859|0877|0878)/,
            "Axis": /^(0831|0832|0833|0838)/,
            "Smartfren": /^(0881|0882|0883|0884|0885|0886|0887|0888|0889)/
        };

        let currentOperator = "";

        phoneInput.addEventListener('input', () => {
            let num = phoneInput.value.trim();
            let foundOp = null;

            if (num.length >= 4) {
                for (let op in operators) {
                    let digitsToTest = op === "by.U" ? num.substring(0, 5) : num.substring(0, 4);
                    if (operators[op].test(digitsToTest)) {
                        foundOp = op;
                        break;
                    }
                }
            }

            if (foundOp) {
                currentOperator = foundOp;
                operatorName.textContent = foundOp;
                operatorBox.classList.remove('hidden');
                btnLanjut.disabled = false;
            } else {
                currentOperator = "";
                operatorBox.classList.add('hidden');
                btnLanjut.disabled = true;
            }
        });

        btnLanjut.addEventListener('click', () => {
            detailPhone.textContent = phoneInput.value + " (" + currentOperator + ")";
            stepInput.classList.add('hidden');
            stepPay.classList.remove('hidden');
        });

        btnKonfirmasi.addEventListener('click', () => {
            const resi = resiInput.value.trim();
            if(!resi) { alert("Mohon masukkan ID Referensi/Resi DANA terlebih dahulu."); return; }

            btnKonfirmasi.disabled = true;
            btnKonfirmasi.textContent = "Memverifikasi...";

            fetch('/api/transaksi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    phone: phoneInput.value.trim(),
                    operator: currentOperator,
                    nominal: "10000",
                    buktiString: resi
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                btnKonfirmasi.disabled = false;
                btnKonfirmasi.textContent = "Konfirmasi Pembayaran";
            })
            .catch(err => {
                alert("Koneksi gagal: " + err.message);
                btnKonfirmasi.disabled = false;
                btnKonfirmasi.textContent = "Konfirmasi Pembayaran";
            });
        });
    </script>
</body>
</html>
